services:
  - type: web
    name: collection-manager-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist/collection-manager/browser
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
