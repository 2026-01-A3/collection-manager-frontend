<div class="modal-overlay" (click)="onClose.emit()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ title() }}</h2>
      <button class="btn-close" (click)="onClose.emit()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="item-name">Nome</label>
        <input
          type="text"
          id="item-name"
          [(ngModel)]="formData().name"
          [disabled]="isLoading()"
          placeholder="Ex: Camiseta Azul"
        />
      </div>
      <div class="form-group">
        <label for="item-description">Descrição</label>
        <textarea
          id="item-description"
          rows="3"
          [(ngModel)]="formData().description"
          [disabled]="isLoading()"
          placeholder="Detalhes adicionais (opcional)"
        ></textarea>
      </div>
      <div class="form-group">
        <label for="item-price">Valor (R$)</label>
        <input
          type="number"
          id="item-price"
          step="0.01"
          min="0"
          [(ngModel)]="formData().price"
          [disabled]="isLoading()"
          placeholder="0,00"
        />
      </div>
      <div class="form-group">
        <label for="item-tag-input">Tags</label>
        <div class="tag-input-row">
          <input
            type="text"
            id="item-tag-input"
            [ngModel]="tagInput()"
            (ngModelChange)="tagInput.set($event)"
            (keydown)="onTagKeydown($event)"
            [disabled]="isLoading()"
            placeholder="Digite uma tag e pressione Enter"
          />
          <button
            type="button"
            class="btn-secondary"
            (click)="addTagFromInput()"
            [disabled]="isLoading() || !tagInput().trim()"
          >
            Adicionar
          </button>
        </div>
        @if (tags().length > 0) {
          <div class="tag-list">
            @for (tag of tags(); track tag) {
              <span
                class="tag-chip"
                [style.background]="tagStyle(tag).background"
                [style.color]="tagStyle(tag).color"
                [style.borderColor]="tagStyle(tag).border"
              >
                {{ tag }}
                <button
                  type="button"
                  class="tag-remove"
                  (click)="removeTag(tag)"
                  [disabled]="isLoading()"
                  aria-label="Remover tag"
                >&times;</button>
              </span>
            }
          </div>
        }
      </div>
      <div class="form-group">
        <label for="item-image">Foto</label>
        <input
          type="file"
          id="item-image"
          accept="image/*"
          (change)="onFileSelected($event)"
          [disabled]="isLoading()"
        />
        @if (previewUrl()) {
          <div class="image-preview">
            <img [src]="previewUrl()" alt="Prévia" />
          </div>
        }
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" (click)="onClose.emit()" [disabled]="isLoading()">
        Cancelar
      </button>
      <button class="btn-primary" (click)="save()" [disabled]="isLoading()">
        {{ buttonText() }}
      </button>
    </div>
  </div>
</div>
