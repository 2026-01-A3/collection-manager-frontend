<section class="category-page">
	<h1>Gerenciamento de Categorias</h1>

	<form (ngSubmit)="addCategory()" class="category-form">
		<input type="text" [(ngModel)]="newCategoryName" name="categoryName" placeholder="Nova categoria"
			autocomplete="off" [disabled]="isLoading()" />
		<button type="submit" [disabled]="isLoading()">Adicionar</button>
	</form>

	@if (isLoading()) {
	<p>Carregando categorias...</p>
	}

	@if (!isLoading() && categories().length > 0) {
	<div class="table-container">
		<table class="category-table">
			<thead>
				<tr>
					<th>Nome</th>
					<th class="text-right">Ações</th>
				</tr>
			</thead>
			<tbody>
				<tr *ngFor="let c of categories()">
					<td>{{ c.name }}</td>
					<td class="text-right">
						<div class="dropdown">
							<button type="button" class="btn-dropdown" (click)="toggleDropdown(c.id!)"
								[disabled]="isLoading()">
								Ações ▾
							</button>
							@if (openDropdownId() === c.id) {
							<div class="dropdown-menu">
								<button type="button" (click)="openEditModal(c)">Editar</button>
								<button type="button" class="delete" (click)="deleteCategory(c.id!)">Excluir</button>
							</div>
							}
						</div>
					</td>
				</tr>
			</tbody>
		</table>
	</div>
	}

	@if (!isLoading() && categories().length === 0) {
	<p>Nenhuma categoria cadastrada.</p>
	}

	@if (showEditModal()) {
	<app-category-edit-modal [category]="editingCategory()" (close)="closeEditModal()"
		(save)="onCategorySaved($event)">
	</app-category-edit-modal>
	}
</section>
