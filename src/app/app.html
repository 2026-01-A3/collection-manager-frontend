<main class="app-shell" [class.drawer-open]="drawerOpen()">
  <header>
    <a routerLink="/" class="brand" aria-label="Acervo" (click)="closeDrawer()">
      <svg class="brand-logo" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <linearGradient id="brand-g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6366f1"/>
            <stop offset="1" stop-color="#8b5cf6"/>
          </linearGradient>
        </defs>
        <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#brand-g)"/>
        <rect x="16" y="40" width="32" height="6" rx="2" fill="#ffffff" opacity="0.55"/>
        <rect x="14" y="30" width="36" height="6" rx="2" fill="#ffffff" opacity="0.8"/>
        <rect x="12" y="16" width="40" height="10" rx="3" fill="#ffffff"/>
      </svg>
      <h1>{{ title() }}</h1>
    </a>

    <div class="header-actions">
      <button
        type="button"
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="theme() === 'dark' ? 'Mudar para tema claro' : 'Mudar para tema escuro'"
        [title]="theme() === 'dark' ? 'Tema claro' : 'Tema escuro'"
      >
        @if (theme() === 'dark') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <button
      type="button"
      class="menu-toggle"
      (click)="toggleDrawer()"
      [attr.aria-expanded]="drawerOpen()"
      aria-label="Abrir menu"
      aria-controls="mobile-drawer"
    >
      @if (drawerOpen()) {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      }
    </button>
    </div>

    <nav id="mobile-drawer" [class.open]="drawerOpen()">
      @if (currentUser()) {
        <a routerLink="/categories" routerLinkActive="active" (click)="closeDrawer()">Categorias</a>
        <a routerLink="/collections" routerLinkActive="active" (click)="closeDrawer()">Coleções</a>
        @if (currentUser()?.role === 'ADMIN') {
          <a routerLink="/register" routerLinkActive="active" (click)="closeDrawer()">Registrar Usuário</a>
        }
      }
      @if (currentUser()) {
        <div class="user-info">
          <span>Olá, {{ currentUser()?.name }}</span>
          <button (click)="logout()" class="btn-logout">Sair</button>
        </div>
      } @else {
        <a routerLink="/login" routerLinkActive="active" (click)="closeDrawer()">Login</a>
      }
    </nav>

    <div
      class="drawer-backdrop"
      [class.visible]="drawerOpen()"
      (click)="closeDrawer()"
      aria-hidden="true"
    ></div>
  </header>

  <section class="page-content">
    <router-outlet></router-outlet>
    <app-confirmation-modal></app-confirmation-modal>
    <app-alert-modal></app-alert-modal>
  </section>
</main>
